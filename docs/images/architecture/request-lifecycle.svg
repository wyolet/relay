<svg xmlns="http://www.w3.org/2000/svg" width="880" height="280" viewBox="0 0 880 280" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah3" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#94a3b8"/></marker>
    <style>
      .step { fill: #ffffff; stroke: #C4B5FD; stroke-width: 1.5; }
      .num { font-size: 12px; font-weight: 700; fill: #8B5CF6; }
      .h { font-size: 13px; font-weight: 700; fill: #1e293b; }
      .t { font-size: 10.5px; fill: #64748b; }
      .detached { fill: #FAF5FF; stroke: #C084FC; stroke-width: 1.5; stroke-dasharray: 6,4; }
      .dh { font-size: 12.5px; font-weight: 700; fill: #7C3AED; }
    </style>
  </defs>
  <rect width="880" height="280" fill="#FCFCFF"/>

  <g>
    <rect x="30" y="40" width="150" height="78" rx="10" class="step"/>
    <text x="46" y="62" class="num">1 · Authenticate</text>
    <text x="46" y="82" class="t">relay-key hash</text>
    <text x="46" y="98" class="t">looked up in snapshot</text>

    <rect x="205" y="40" width="150" height="78" rx="10" class="step"/>
    <text x="221" y="62" class="num">2 · Route</text>
    <text x="221" y="82" class="t">policy grants model</text>
    <text x="221" y="98" class="t">→ host binding</text>

    <rect x="380" y="40" width="150" height="78" rx="10" class="step"/>
    <text x="396" y="62" class="num">3 · Reserve + key</text>
    <text x="396" y="82" class="t">rate-limit (1 Lua call)</text>
    <text x="396" y="98" class="t">draw healthy host key</text>

    <rect x="555" y="40" width="150" height="78" rx="10" class="step"/>
    <text x="571" y="62" class="num">4 · Forward</text>
    <text x="571" y="82" class="t">stream response</text>
    <text x="571" y="98" class="t">byte-pass or translate</text>

    <rect x="730" y="40" width="120" height="78" rx="10" fill="#fff" stroke="#FBBF24" stroke-width="1.5"/>
    <text x="746" y="62" class="num" fill="#D97706">Caller</text>
    <text x="746" y="82" class="t">bytes flow</text>
    <text x="746" y="98" class="t">no mid-stream</text>
    <text x="746" y="112" class="t">failover</text>

    <path d="M180 79 L205 79" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ah3)"/>
    <path d="M355 79 L380 79" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ah3)"/>
    <path d="M530 79 L555 79" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ah3)"/>
    <path d="M705 79 L730 79" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ah3)"/>
  </g>

  <!-- detached post-flight -->
  <rect x="30" y="168" width="820" height="78" rx="10" class="detached"/>
  <text x="48" y="194" class="dh">5 · Post-flight — detached goroutine, never blocks the response</text>
  <text x="48" y="216" class="t">commit rate-limit usage · record key success · fire usage observers (async, drop-on-full)</text>
  <text x="48" y="234" class="t">fires when the response body closes</text>
  <path d="M605 118 L605 168" stroke="#C084FC" stroke-width="1.6" marker-end="url(#ah3)" stroke-dasharray="5,4"/>
</svg>
