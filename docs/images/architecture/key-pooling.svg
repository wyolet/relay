<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#8B5CF6"/></marker>
    <marker id="ahg" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#94a3b8"/></marker>
    <style>
      .card { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
      .accent { fill: #F5F3FF; stroke: #C4B5FD; stroke-width: 1.5; }
      .ok { fill: #ffffff; stroke: #86EFAC; stroke-width: 1.8; }
      .down { fill: #FEF2F2; stroke: #FCA5A5; stroke-width: 1.8; }
      .h { font-size: 14px; font-weight: 700; fill: #1e293b; }
      .t { font-size: 11.5px; fill: #64748b; }
      .lbl { font-size: 11px; fill: #8B5CF6; font-weight: 600; }
      .pill { font-size: 10.5px; font-weight: 700; }
    </style>
  </defs>
  <rect width="880" height="360" fill="#FCFCFF"/>

  <!-- caller -->
  <rect x="36" y="150" width="150" height="60" rx="10" class="card"/>
  <text x="54" y="176" class="h">Your app</text>
  <text x="54" y="194" class="t">one relay key</text>

  <!-- relay / selector -->
  <rect x="250" y="130" width="200" height="100" rx="12" class="accent"/>
  <text x="270" y="158" class="h">Relay · key selector</text>
  <text x="270" y="180" class="t">pick healthy key</text>
  <text x="270" y="197" class="t">atomic (1 Redis Lua)</text>
  <text x="270" y="214" class="t">per-key circuit breaker</text>

  <!-- pool -->
  <rect x="520" y="40" width="324" height="60" rx="10" class="ok"/>
  <text x="540" y="65" class="h">Host key A</text>
  <text x="540" y="83" class="t">healthy</text>
  <rect x="780" y="52" width="50" height="20" rx="10" fill="#DCFCE7"/>
  <text x="788" y="66" class="pill" fill="#16A34A">live</text>

  <rect x="520" y="118" width="324" height="60" rx="10" class="down"/>
  <text x="540" y="143" class="h">Host key B</text>
  <text x="540" y="161" class="t">breaker open — skipped</text>
  <rect x="772" y="130" width="58" height="20" rx="10" fill="#FEE2E2"/>
  <text x="780" y="144" class="pill" fill="#DC2626">down</text>

  <rect x="520" y="196" width="324" height="60" rx="10" class="ok"/>
  <text x="540" y="221" class="h">Host key C</text>
  <text x="540" y="239" class="t">healthy</text>
  <rect x="780" y="208" width="50" height="20" rx="10" fill="#DCFCE7"/>
  <text x="788" y="222" class="pill" fill="#16A34A">live</text>

  <!-- arrows -->
  <path d="M186 180 L250 180" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ahg)"/>
  <path d="M450 160 Q490 160 490 70 L520 70" fill="none" stroke="#8B5CF6" stroke-width="1.8" marker-end="url(#ah)"/>
  <path d="M450 200 Q490 200 490 226 L520 226" fill="none" stroke="#8B5CF6" stroke-width="1.8" marker-end="url(#ah)"/>
  <path d="M450 180 Q488 180 488 148 L520 148" fill="none" stroke="#CBD5E1" stroke-width="1.6" stroke-dasharray="4,4"/>

  <text x="300" y="300" class="lbl">Effective rate limit = sum of healthy keys · failover is pre-first-byte</text>
</svg>
