<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#a78bfa"/></marker>
    <style>
      .card { fill: #131c31; stroke: #2a3852; stroke-width: 1.5; }
      .accent { fill: #1e1b3a; stroke: #7c5cff; stroke-width: 1.5; }
      .h { font-size: 14px; font-weight: 700; fill: #e2e8f0; }
      .t { font-size: 11.5px; fill: #94a3b8; }
      .lbl { font-size: 11px; fill: #a78bfa; font-weight: 600; }
      .mono { font-size: 10.5px; fill: #94a3b8; font-family: "SF Mono", Menlo, Consolas, monospace; }
    </style>
  </defs>
  <rect width="880" height="300" fill="#0b1120"/>

  <rect x="36" y="110" width="190" height="84" rx="12" class="card"/>
  <text x="56" y="146" class="h">Claude Code</text>
  <text x="56" y="166" class="t">your Anthropic login</text>
  <text x="56" y="183" class="t">(OAuth / API key)</text>

  <rect x="346" y="98" width="190" height="108" rx="12" class="accent"/>
  <text x="366" y="128" class="h">Relay</text>
  <text x="366" y="148" class="t">proxy mode</text>
  <text x="366" y="170" class="t">logs usage ·</text>
  <text x="366" y="187" class="t">captures payload</text>

  <rect x="654" y="110" width="190" height="84" rx="12" class="card"/>
  <text x="674" y="146" class="h">Anthropic</text>
  <text x="674" y="166" class="t">your request,</text>
  <text x="674" y="183" class="t">unchanged</text>

  <path d="M226 152 L346 152" stroke="#a78bfa" stroke-width="1.8" marker-end="url(#ah)"/>
  <text x="236" y="128" class="mono">Authorization:</text>
  <text x="236" y="143" class="mono">your key</text>

  <path d="M536 152 L654 152" stroke="#a78bfa" stroke-width="1.8" marker-end="url(#ah)"/>
  <text x="556" y="128" class="mono">forwarded</text>
  <text x="556" y="143" class="mono">as-is</text>

  <text x="346" y="246" class="lbl">Attributed to your relay key (X-WR-API-Key) · credential never substituted</text>
</svg>
