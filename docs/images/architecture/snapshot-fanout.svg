<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah2" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#8B5CF6"/></marker>
    <style>
      .card { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
      .accent { fill: #F5F3FF; stroke: #C4B5FD; stroke-width: 1.5; }
      .h { font-size: 14px; font-weight: 700; fill: #1e293b; }
      .t { font-size: 11.5px; fill: #64748b; }
      .lbl { font-size: 11px; fill: #8B5CF6; font-weight: 600; }
    </style>
  </defs>
  <rect width="880" height="320" fill="#FCFCFF"/>

  <!-- write -->
  <rect x="40" y="130" width="150" height="60" rx="10" class="accent"/>
  <text x="58" y="156" class="h">Admin write</text>
  <text x="58" y="174" class="t">CRUD via control plane</text>

  <!-- postgres -->
  <rect x="270" y="130" width="160" height="60" rx="10" class="card"/>
  <text x="288" y="156" class="h">Postgres</text>
  <text x="288" y="174" class="t">commit + NOTIFY</text>

  <!-- pods -->
  <rect x="640" y="30" width="200" height="64" rx="10" class="card"/>
  <text x="658" y="55" class="h">Pod A</text>
  <text x="658" y="74" class="t">rebuild snapshot · swap</text>
  <rect x="640" y="128" width="200" height="64" rx="10" class="card"/>
  <text x="658" y="153" class="h">Pod B</text>
  <text x="658" y="172" class="t">rebuild snapshot · swap</text>
  <rect x="640" y="226" width="200" height="64" rx="10" class="card"/>
  <text x="658" y="251" class="h">Pod C</text>
  <text x="658" y="270" class="t">rebuild snapshot · swap</text>

  <!-- arrows -->
  <path d="M190 160 L270 160" stroke="#8B5CF6" stroke-width="1.8" marker-end="url(#ah2)"/>
  <path d="M430 150 Q540 150 540 62 L640 62" fill="none" stroke="#8B5CF6" stroke-width="1.8" marker-end="url(#ah2)" stroke-dasharray="5,4"/>
  <path d="M430 160 L640 160" stroke="#8B5CF6" stroke-width="1.8" marker-end="url(#ah2)" stroke-dasharray="5,4"/>
  <path d="M430 170 Q540 170 540 258 L640 258" fill="none" stroke="#8B5CF6" stroke-width="1.8" marker-end="url(#ah2)" stroke-dasharray="5,4"/>
  <text x="468" y="120" class="lbl">NOTIFY fan-out · every pod ~1s</text>
</svg>
