<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#a78bfa"/></marker>
    <marker id="ahg" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#8595ad"/></marker>
    <style>
      .card { fill: #131c31; stroke: #2a3852; stroke-width: 1.5; }
      .accent { fill: #1e1b3a; stroke: #7c5cff; stroke-width: 1.5; }
      .ok { fill: #131c31; stroke: #34d399; stroke-width: 1.8; }
      .down { fill: #2a1414; stroke: #f87171; stroke-width: 1.8; }
      .h { font-size: 14px; font-weight: 700; fill: #e2e8f0; }
      .t { font-size: 11.5px; fill: #94a3b8; }
      .lbl { font-size: 11px; fill: #a78bfa; font-weight: 600; }
      .pill { font-size: 10.5px; font-weight: 700; }
    </style>
  </defs>
  <rect width="880" height="360" fill="#0b1120"/>

  <!-- caller -->
  <rect x="36" y="150" width="150" height="60" rx="10" class="card"/>
  <text x="54" y="176" class="h">Your app</text>
  <text x="54" y="194" class="t">one relay key</text>

  <!-- relay / selector -->
  <rect x="250" y="130" width="200" height="100" rx="12" class="accent"/>
  <text x="270" y="158" class="h">Relay · key selector</text>
  <text x="270" y="180" class="t">pick healthy key</text>
  <text x="270" y="197" class="t">atomic (1 Redis Lua)</text>
  <text x="270" y="214" class="t">per-key circuit breaker</text>

  <!-- pool -->
  <rect x="520" y="40" width="324" height="60" rx="10" class="ok"/>
  <text x="540" y="65" class="h">Host key A</text>
  <text x="540" y="83" class="t">healthy</text>
  <rect x="780" y="52" width="50" height="20" rx="10" fill="#0f2a1e"/>
  <text x="788" y="66" class="pill" fill="#4ade80">live</text>

  <rect x="520" y="118" width="324" height="60" rx="10" class="down"/>
  <text x="540" y="143" class="h">Host key B</text>
  <text x="540" y="161" class="t">breaker open — skipped</text>
  <rect x="772" y="130" width="58" height="20" rx="10" fill="#3a1620"/>
  <text x="780" y="144" class="pill" fill="#f87171">down</text>

  <rect x="520" y="196" width="324" height="60" rx="10" class="ok"/>
  <text x="540" y="221" class="h">Host key C</text>
  <text x="540" y="239" class="t">healthy</text>
  <rect x="780" y="208" width="50" height="20" rx="10" fill="#0f2a1e"/>
  <text x="788" y="222" class="pill" fill="#4ade80">live</text>

  <!-- arrows -->
  <path d="M186 180 L250 180" stroke="#8595ad" stroke-width="1.6" marker-end="url(#ahg)"/>
  <path d="M450 160 Q490 160 490 70 L520 70" fill="none" stroke="#a78bfa" stroke-width="1.8" marker-end="url(#ah)"/>
  <path d="M450 200 Q490 200 490 226 L520 226" fill="none" stroke="#a78bfa" stroke-width="1.8" marker-end="url(#ah)"/>
  <path d="M450 180 Q488 180 488 148 L520 148" fill="none" stroke="#475569" stroke-width="1.6" stroke-dasharray="4,4"/>

  <text x="300" y="300" class="lbl">Effective rate limit = sum of healthy keys · failover is pre-first-byte</text>
</svg>
