upstream relay_dp { server relay-a:8080; server relay-b:8080; keepalive 256; }
server {
  listen 80;
  location / {
    proxy_pass http://relay_dp;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_buffering off;            # don't buffer SSE
    proxy_read_timeout 600s;
  }
}
