metadata:
    name: claude-3-5-sonnet-20241022
    labels:
        family: claude
        source: litellm
        source_version: test-version
spec:
    provider: anthropic
    upstreamName: claude-3-5-sonnet-20241022
    family: claude
    capabilities:
        chat: true
        streaming: true
        tools: true
        parallelTools: true
        vision: true
        promptCache: true
        structuredOutput: true
        batch: true
        computerUse: true
        fileInput: true
