apiVersion: v2
name: relay
description: |
  Wyolet Relay — high-throughput LLM router. Single self-migrating binary serving
  the inference (data) plane and the control plane, with its OWN bundled
  PostgreSQL (config truth), ClickHouse (usage/payload events), and Valkey
  (hot state + rate-limit counters). Relay never shares the platform's managed
  Postgres — it provisions and owns its data stores.
type: application
# Chart version — bump on chart changes.
version: 0.1.0
# Default app version; override via image.tag for a specific relay release.
appVersion: "latest"
keywords:
  - llm
  - router
  - gateway
  - openai
  - anthropic
home: https://github.com/wyolet/relay
sources:
  - https://github.com/wyolet/relay
maintainers:
  - name: wyolet
