# Production overrides. Copy to values-prod.yaml, fill the secrets via your
# secret manager (sealed-secrets / SOPS / external-secrets), and:
#   helm upgrade --install relay ./infra/k8s/relay -n relay --create-namespace -f values-prod.yaml

image:
  tag: "0.4.0"        # pin a real released version, never :latest in prod

replicaCount: 3

# --- security-critical: generate once, store in your secret manager ---
# Prefer secrets.existingSecret over inlining these.
secrets:
  existingSecret: ""               # e.g. relay-secrets (managed out-of-band)
  masterKey: ""                    # openssl rand -base64 32
  adminToken: ""                   # sk-wr-<random>

postgresql:
  enabled: true                    # relay's OWN PG — never the shared platform PG
  auth:
    password: ""                   # set, or provide via existingSecret
  primary:
    persistence:
      size: 20Gi
      storageClass: "fast-ssd"

clickhouse:
  enabled: true
  auth:
    password: ""
  persistence:
    size: 100Gi
    storageClass: "fast-ssd"

valkey:
  enabled: true
  persistence:
    size: 10Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 65

resources:
  requests: { cpu: 500m, memory: 512Mi }
  limits:   { cpu: "2",  memory: 2Gi }
goMemLimit: "1800MiB"

serviceMonitor:
  enabled: true                    # requires prometheus-operator CRDs

networkPolicy:
  enabled: true

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Inference responses stream — disable proxy buffering on your controller.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
  inference:
    host: api.relay.example.com
  control:
    host: admin.relay.example.com
  tls:
    - secretName: relay-tls
      hosts:
        - api.relay.example.com
        - admin.relay.example.com

# Lock CORS to the control UI origin if the UI is served off-origin.
relay:
  controlAllowOrigins: "https://admin.relay.example.com"
