apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "relay.fullname" . }}
  labels:
    {{- include "relay.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "relay.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "relay.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}{{ toYaml . | nindent 8 }}{{- end }}
      annotations:
        # Roll pods when the rendered config/secret changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.secrets.existingSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.auth.adminUser.enabled }}
        checksum/users: {{ include (print $.Template.BasePath "/users-configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}{{ toYaml . | nindent 8 }}{{- end }}
    spec:
      serviceAccountName: {{ include "relay.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      # Wait for relay's own data stores before starting (relay self-migrates PG
      # on boot; CH/Valkey are needed for the selected backends).
      initContainers:
        - name: wait-for-stores
          image: busybox:1.36
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command: ["sh", "-c"]
          args:
            - |
              {{- if .Values.postgresql.enabled }}
              until nc -z {{ include "relay.postgresql.fullname" . }} 5432; do echo "waiting for postgres"; sleep 2; done
              {{- end }}
              {{- if .Values.clickhouse.enabled }}
              until nc -z {{ include "relay.clickhouse.fullname" . }} 9000; do echo "waiting for clickhouse"; sleep 2; done
              {{- end }}
              {{- if .Values.valkey.enabled }}
              until nc -z {{ include "relay.valkey.fullname" . }} 6379; do echo "waiting for valkey"; sleep 2; done
              {{- end }}
              echo "data stores reachable"
      containers:
        - name: relay
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.relay.port }}
            - name: control
              containerPort: {{ .Values.relay.controlPort }}
          envFrom:
            - configMapRef:
                name: {{ include "relay.fullname" . }}
          env:
            - name: RELAY_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: RELAY_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "relay.secretName" . }}
                  key: RELAY_MASTER_KEY
            - name: RELAY_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "relay.secretName" . }}
                  key: RELAY_ADMIN_TOKEN
            - name: RELAY_PG_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "relay.secretName" . }}
                  key: RELAY_PG_DSN
            {{- if or .Values.clickhouse.enabled .Values.external.chDsn }}
            - name: RELAY_CH_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "relay.secretName" . }}
                  key: RELAY_CH_DSN
            {{- end }}
            {{- if .Values.auth.adminUser.enabled }}
            - name: RELAY_CONFIG_DIR
              value: {{ .Values.auth.adminUser.configDir | quote }}
            - name: RELAY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "relay.secretName" . }}
                  key: RELAY_ADMIN_PASSWORD
            {{- end }}
            {{- with .Values.relay.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            # Generous window: covers PG migrations + first-boot catalog seed.
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: state
              mountPath: /var/lib/relay
            - name: tmp
              mountPath: /tmp
            {{- if .Values.auth.adminUser.enabled }}
            # subPath mounts the single file (no ConfigMap ..data symlink tree),
            # so relay's recursive User loader can't read admin.yaml twice.
            - name: users
              mountPath: {{ .Values.auth.adminUser.configDir }}/admin.yaml
              subPath: admin.yaml
              readOnly: true
            {{- end }}
      volumes:
        # readOnlyRootFilesystem -> writable scratch for the CH WAL + temp.
        - name: state
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        {{- if .Values.auth.adminUser.enabled }}
        - name: users
          configMap:
            name: {{ include "relay.fullname" . }}-users
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
