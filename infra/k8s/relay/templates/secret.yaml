{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "relay.fullname" . }}
  labels:
    {{- include "relay.labels" . | nindent 4 }}
type: Opaque
stringData:
  RELAY_MASTER_KEY: {{ required "secrets.masterKey is required (openssl rand -base64 32), or set secrets.existingSecret" .Values.secrets.masterKey | quote }}
  RELAY_ADMIN_TOKEN: {{ required "secrets.adminToken is required, or set secrets.existingSecret" .Values.secrets.adminToken | quote }}
  RELAY_PG_DSN: {{ include "relay.pgDsn" . | quote }}
  RELAY_CH_DSN: {{ include "relay.chDsn" . | quote }}
  {{- if .Values.postgresql.enabled }}
  postgres-password: {{ required "postgresql.auth.password is required" .Values.postgresql.auth.password | quote }}
  {{- end }}
  {{- if .Values.clickhouse.enabled }}
  clickhouse-password: {{ required "clickhouse.auth.password is required" .Values.clickhouse.auth.password | quote }}
  {{- end }}
{{- end }}
