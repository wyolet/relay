{{- if .Values.networkPolicy.enabled }}
# Restrict the bundled data stores to accept traffic only from relay pods.
{{- range $c := list "postgresql" "clickhouse" "valkey" }}
{{- $enabled := (index $.Values $c).enabled }}
{{- if $enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "relay.fullname" $ }}-{{ $c }}
  labels:
    {{- include "relay.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $c }}
spec:
  podSelector:
    matchLabels:
      {{- include "relay.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $c }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "relay.selectorLabels" $ | nindent 14 }}
{{- end }}
{{- end }}
{{- end }}
