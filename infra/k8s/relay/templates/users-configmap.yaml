{{- if .Values.auth.adminUser.enabled }}
# Admin login User loaded by relay from RELAY_CONFIG_DIR. The password is NOT in
# this ConfigMap — it is referenced from the Secret via valueFrom.env, so this
# stays non-sensitive.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "relay.fullname" . }}-users
  labels:
    {{- include "relay.labels" . | nindent 4 }}
data:
  admin.yaml: |
    apiVersion: relay.wyolet.dev/v1
    kind: User
    metadata:
      name: {{ .Values.auth.adminUser.username }}
    spec:
      username: {{ .Values.auth.adminUser.username }}
      password:
        valueFrom:
          env: RELAY_ADMIN_PASSWORD
      roles:
        - admin
{{- end }}
