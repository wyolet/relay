{{- if .Values.valkey.enabled }}
{{- $vk := include "relay.valkey.fullname" . }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $vk }}
  labels:
    {{- include "relay.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
spec:
  clusterIP: None
  selector:
    {{- include "relay.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
  ports:
    - name: valkey
      port: 6379
      targetPort: valkey
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $vk }}
  labels:
    {{- include "relay.labels" . | nindent 4 }}
    app.kubernetes.io/component: valkey
spec:
  serviceName: {{ $vk }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "relay.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: valkey
  template:
    metadata:
      labels:
        {{- include "relay.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: valkey
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: valkey
          image: {{ .Values.valkey.image | quote }}
          command:
            - valkey-server
            - --dir
            - /data
            {{- if .Values.valkey.persistence.enabled }}
            - --appendonly
            - "yes"
            {{- end }}
            - --maxmemory-policy
            - noeviction
          ports:
            - name: valkey
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["valkey-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.valkey.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
  {{- if .Values.valkey.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.valkey.persistence.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.valkey.persistence.size | quote }}
  {{- else }}
      volumes:
        - name: data
          emptyDir: {}
  {{- end }}
{{- end }}
