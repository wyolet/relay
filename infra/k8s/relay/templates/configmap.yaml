apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "relay.fullname" . }}
  labels:
    {{- include "relay.labels" . | nindent 4 }}
data:
  RELAY_PORT: {{ .Values.relay.port | quote }}
  RELAY_CONTROL_PORT: {{ .Values.relay.controlPort | quote }}
  RELAY_MODE: {{ .Values.relay.mode | quote }}
  RELAY_CLUSTER_MODE: {{ .Values.relay.clusterMode | quote }}
  RELAY_STATE_BACKEND: {{ .Values.relay.stateBackend | quote }}
  RELAY_EVENTLOG_BACKEND: {{ .Values.relay.eventlogBackend | quote }}
  RELAY_EVENTLOG_DIR: {{ .Values.relay.eventlogDir | quote }}
  RELAY_BATCH_PAYLOAD_DIR: {{ .Values.relay.batchPayloadDir | quote }}
  RELAY_REDIS_ADDR: {{ include "relay.redisAddr" . | quote }}
  RELAY_CH_RETENTION_DAYS: {{ .Values.clickhouse.retentionDays | quote }}
  RELAY_LOG_LEVEL: {{ .Values.relay.logLevel | quote }}
  RELAY_COOKIE_SECURE: {{ .Values.relay.cookieSecure | quote }}
  RELAY_HEALTHZ_DEADLINE_MS: {{ .Values.relay.healthzDeadlineMs | quote }}
  {{- with .Values.relay.maxRequestBytes }}
  RELAY_MAX_REQUEST_BYTES: {{ . | quote }}
  {{- end }}
  {{- with .Values.relay.controlAllowOrigins }}
  RELAY_CONTROL_ALLOW_ORIGINS: {{ . | quote }}
  {{- end }}
  {{- $inferenceUrl := .Values.relay.inferenceApiUrl }}
  {{- if and (not $inferenceUrl) .Values.gateway.enabled .Values.gateway.inference.host }}
  {{- $inferenceUrl = printf "https://%s" .Values.gateway.inference.host }}
  {{- else if and (not $inferenceUrl) .Values.ingress.enabled .Values.ingress.inference.host }}
  {{- $inferenceUrl = printf "https://%s" .Values.ingress.inference.host }}
  {{- end }}
  {{- with $inferenceUrl }}
  RELAY_INFERENCE_API_URL: {{ . | quote }}
  {{- end }}
  GOMEMLIMIT: {{ .Values.goMemLimit | quote }}
  GOGC: {{ .Values.goGC | quote }}
