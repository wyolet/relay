upstream relays {
    server relay-a:8080;
    server relay-b:8080;
}

server {
    listen 80;

    location / {
        proxy_pass http://relays;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
