# Production-shape stack. Pulls images, no `build:` — bake is the only builder.
# Every value comes from `.env`. Prod-deployable as-is given the right .env.
#
# Standalone (default):  docker compose up            (auto-merges override.yml — bundles PG/CH/Jaeger, builds from source)
# Dev-stack mode:        docker compose -f deploy/compose/docker-compose.yml -f deploy/compose/docker-compose.dev.yml up
#
# The dev-stack `dev-net` external network lives in docker-compose.dev.yml so a
# fresh `docker compose up` doesn't require a network it can't have.

name: wyolet-relay

volumes:
  valkey-data:

services:
  valkey:
    image: valkey/valkey:8-alpine
    container_name: relay-valkey
    restart: unless-stopped
    volumes:
      - valkey-data:/data
    # Published on the host so `make dev` (host-side go run) can reach it.
    # The full compose stack still talks to it as `valkey:6379` over the
    # default network regardless of this mapping.
    ports:
      - "${RELAY_VALKEY_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 3s
      timeout: 5s
      retries: 10

  relay-a:
    image: ${RELAY_IMAGE:-ghcr.io/wyolet/relay:latest}
    container_name: relay-a
    restart: unless-stopped
    env_file: [../../.env]
    environment:
      RELAY_INSTANCE_ID: relay-a
      RELAY_CONTROL_PORT: "8081"
    volumes:
      - ./config:/config:ro
    depends_on:
      valkey: {condition: service_healthy}
    ports:
      - "${RELAY_A_PORT:-5101}:8080"
      - "${RELAY_CONTROL_PORT:-5103}:8081"
  relay-b:
    image: ${RELAY_IMAGE:-ghcr.io/wyolet/relay:latest}
    container_name: relay-b
    restart: unless-stopped
    env_file: [../../.env]
    environment:
      RELAY_INSTANCE_ID: relay-b
    volumes:
      - ./config:/config:ro
    depends_on:
      valkey: {condition: service_healthy}
    ports:
      - "${RELAY_B_PORT:-5102}:8080"
  nginx:
    image: nginx:alpine
    container_name: relay-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${RELAY_LB_PORT:-5100}:80"
    depends_on: [relay-a, relay-b]
