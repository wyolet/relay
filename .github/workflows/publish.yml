name: Publish image

# Builds and pushes the multi-arch relay images (lean + all-in-one) to BOTH
# ghcr.io/wyolet/relay and docker.io/wyolet/relay on every version tag (and on
# demand). The image bakes in the pinned admin UI + catalog (see Dockerfile).
#
# Required repo secrets:
#   UI_FETCH_TOKEN    — read access to the (private) wyolet/relay-ui repo, to
#                       fetch the UI release asset. Drop it + the guard below
#                       once relay-ui is public (Dockerfile falls back to the
#                       public URL).
#   DOCKERHUB_USERNAME / DOCKERHUB_TOKEN — Docker Hub login (a Docker Hub access
#                       token, not the account password).
#
# First publish creates each package private; make them public (ghcr: org
# package settings; Docker Hub: repo settings) so users can pull without auth.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to publish (e.g. v0.1.0)'
        required: true
      ui_version:
        description: 'relay-ui release tag to embed'
        required: false
        default: 'v0.0.1'
      catalog_ref:
        description: 'relay-catalog ref to seed'
        required: false
        default: 'main'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Require secrets
        env:
          UI_FETCH_TOKEN: ${{ secrets.UI_FETCH_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          # Without a UI token the Dockerfile silently ships a UI-less image
          # (relay-ui is private). Drop the UI check once relay-ui is public.
          [ -n "$UI_FETCH_TOKEN" ] || { echo "::error::UI_FETCH_TOKEN secret is required (read access to wyolet/relay-ui)"; exit 1; }
          [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ] || { echo "::error::DOCKERHUB_USERNAME + DOCKERHUB_TOKEN secrets are required"; exit 1; }

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve version
        id: v
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push lean + all-in-one (multi-arch, both registries)
        env:
          VERSION: ${{ steps.v.outputs.version }}
          GIT_REVISION: ${{ github.sha }}
          GH_TOKEN: ${{ secrets.UI_FETCH_TOKEN }}
          UI_VERSION: ${{ github.event.inputs.ui_version || 'v0.0.1' }}
          CATALOG_REF: ${{ github.event.inputs.catalog_ref || 'main' }}
        run: |
          # Args, the gh_token secret, dual-registry tags, and no-cache-filter
          # (force a fresh asset fetch) are all declared in docker-bake.hcl.
          docker buildx bake -f docker-bake.hcl --push prod allinone
