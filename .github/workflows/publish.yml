name: Publish image

# Builds and pushes the multi-arch relay image to ghcr.io/wyolet/relay on every
# version tag (and on demand). The image bakes in the pinned admin UI + catalog
# (see Dockerfile).
#
# Requires repo secret UI_FETCH_TOKEN — a token with read access to the
# (currently private) wyolet/relay-ui repo, used to fetch the UI release asset.
# Once relay-ui is public this secret + the guard step below can be dropped
# (the Dockerfile falls back to the public release URL).
#
# First publish creates the ghcr package as private; make it public in the
# org's package settings so `docker compose up` can pull without auth.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to publish (e.g. v0.1.0)'
        required: true
      ui_version:
        description: 'relay-ui release tag to embed'
        required: false
        default: 'v0.0.1'
      catalog_ref:
        description: 'relay-catalog ref to seed'
        required: false
        default: 'main'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Require UI fetch token
        env:
          UI_FETCH_TOKEN: ${{ secrets.UI_FETCH_TOKEN }}
        run: |
          # Guard: without a token the Dockerfile silently ships a UI-less image
          # (relay-ui is private). Drop this step once relay-ui is public.
          [ -n "$UI_FETCH_TOKEN" ] || { echo "::error::UI_FETCH_TOKEN secret is required (read access to wyolet/relay-ui)"; exit 1; }

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: v
        run: |
          REF="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push (bake prod, multi-arch)
        env:
          VERSION: ${{ steps.v.outputs.version }}
          GIT_REVISION: ${{ github.sha }}
          GH_TOKEN: ${{ secrets.UI_FETCH_TOKEN }}
          UI_VERSION: ${{ github.event.inputs.ui_version || 'v0.0.1' }}
          CATALOG_REF: ${{ github.event.inputs.catalog_ref || 'main' }}
        run: |
          # Args + the gh_token secret are declared in docker-bake.hcl and read
          # from these env vars. --no-cache-filter assets: BuildKit excludes
          # secret values from the cache key, so the asset-fetch stage must run
          # fresh or it could reuse a stale (e.g. UI-less) layer.
          docker buildx bake -f docker-bake.hcl --push \
            --no-cache-filter assets \
            prod allinone
