name: p99 regression gate

on:
  pull_request:

jobs:
  bench:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for baseline comparison against main

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      # Run the bench 3 times (-count=3); each run writes bench/results.json.
      # We capture all three JSON outputs and pick the median.
      - name: Run p99 bench (count=3)
        id: bench
        run: |
          set -euo pipefail
          mkdir -p /tmp/bench-runs

          for i in 1 2 3; do
            GOMAXPROCS=2 go test \
              -bench=BenchmarkRelayInternalOverhead \
              -benchtime=10000x \
              -count=1 \
              -run='^$' \
              ./bench/...
            cp bench/results.json /tmp/bench-runs/run${i}.json
          done

          # Compute median of each percentile field across the 3 runs.
          python3 - <<'PYEOF'
          import json, os, statistics

          runs = []
          for i in (1, 2, 3):
              with open(f"/tmp/bench-runs/run{i}.json") as f:
                  runs.append(json.load(f))

          median_result = {
              "p50_us": int(statistics.median(r["p50_us"] for r in runs)),
              "p95_us": int(statistics.median(r["p95_us"] for r in runs)),
              "p99_us": int(statistics.median(r["p99_us"] for r in runs)),
              "n":      runs[0]["n"],
              "git_sha": os.environ.get("GITHUB_SHA", "unknown"),
          }

          with open("bench/results.json", "w") as f:
              json.dump(median_result, f, indent=2)

          print(f"Median: p50={median_result['p50_us']}µs  p95={median_result['p95_us']}µs  p99={median_result['p99_us']}µs")
          PYEOF

      # Try to get the main-branch baseline for comparison (best-effort; skip on first run).
      - name: Fetch main baseline
        id: baseline
        continue-on-error: true
        run: |
          git show origin/main:bench/results.json > /tmp/main_results.json 2>/dev/null
          echo "found=true" >> "$GITHUB_OUTPUT"

      # Post a PR comment with the comparison table.
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASELINE_FOUND: ${{ steps.baseline.outputs.found }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess

          with open("bench/results.json") as f:
              pr = json.load(f)

          baseline_found = os.environ.get("BASELINE_FOUND", "") == "true"
          main_path = "/tmp/main_results.json"

          main_p50 = main_p95 = main_p99 = None
          if baseline_found:
              try:
                  with open(main_path) as f:
                      main = json.load(f)
                  main_p50 = main["p50_us"]
                  main_p95 = main["p95_us"]
                  main_p99 = main["p99_us"]
              except Exception:
                  pass

          def fmt(us):
              if us is None:
                  return "n/a"
              if us >= 1000:
                  return f"{us/1000:.1f}ms"
              return f"{us}µs"

          slo_ok = pr["p99_us"] <= 5000 and pr["p50_us"] <= 1000
          status = "✅ within SLO (p99 ≤ 5ms, p50 ≤ 1ms)" if slo_ok else "❌ SLO BREACH"

          main_col = f" {fmt(main_p50)} |" if main_p50 is not None else " n/a (first run) |"
          main_col95 = f" {fmt(main_p95)} |" if main_p95 is not None else " n/a |"
          main_col99 = f" {fmt(main_p99)} |" if main_p99 is not None else " n/a |"

          body = f"""### p99 Overhead Report

          | Metric | This PR | main |
          |--------|---------|------|
          | p50    | {fmt(pr['p50_us'])} |{main_col}
          | p95    | {fmt(pr['p95_us'])} |{main_col95}
          | p99    | {fmt(pr['p99_us'])} |{main_col99}

          **n={pr['n']}  sha={pr['git_sha'][:8]}**

          Status: {status}

          > Measured in-process (in-memory config, no real Redis/PG). Overhead = relay total minus bare-stub p50 baseline. See `bench/` for methodology.
          """

          # Dedent
          body = "\n".join(line.lstrip() for line in body.strip().splitlines())

          pr_number = os.environ["PR_NUMBER"]
          subprocess.run(
              ["gh", "pr", "comment", pr_number, "--body", body],
              check=True,
          )
          PYEOF
