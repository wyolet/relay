apiVersion: relay.wyolet.dev/v1
kind: Host
metadata:
    name: amazon-bedrock
    displayName: Amazon Bedrock
    description: AWS-hosted endpoint serving Anthropic Claude and other foundation models. Region defaults to us-east-1; override via spec.backend.region.
    owner:
        kind: system
spec:
    baseURL: https://bedrock-runtime.us-east-1.amazonaws.com
    backend:
      region: us-east-1
    homepageURL: https://aws.amazon.com/bedrock/
    docsURL: https://docs.aws.amazon.com/bedrock/
    consoleURL: https://console.aws.amazon.com/bedrock/
    statusPageURL: https://health.aws.amazon.com/health/status
    icon:
      path: /provider/amazon-bedrock.svg
