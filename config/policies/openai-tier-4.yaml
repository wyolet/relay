apiVersion: relay.wyolet.dev/v1
kind: RateLimit
metadata:
  name: openai-tier-4-rl
  displayName: OpenAI Tier 4 rate limits
  description: "OpenAI Usage Tier 4 ($250+ paid, 14+ days). Numbers reflect gpt-5 / gpt-5.4 defaults per OpenAI Devs (Sep 2024): Tier 4 TPM bumped from 2M → 4M."
  owner:
    kind: host
    name: openai
spec:
  enabled: true
  rules:
    - meter: requests
      amount: 10000
      window: 1m
      strategy: sliding-window
    - meter: tokens
      amount: 4000000
      window: 1m
      strategy: sliding-window
---
apiVersion: relay.wyolet.dev/v1
kind: Policy
metadata:
  name: openai-tier-4
  displayName: OpenAI Tier 4
  owner:
    kind: host
    name: openai
spec:
  rateLimit: openai-tier-4-rl
