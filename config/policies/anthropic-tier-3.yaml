apiVersion: relay.wyolet.dev/v1
kind: RateLimit
metadata:
  name: anthropic-tier-3-rl
  displayName: Anthropic Tier 3 rate limits
  description: "Anthropic Usage Tier 3 ($200 credit purchase). Numbers per docs.anthropic.com, Claude Sonnet 4.x reference. Tokens meter encodes ITPM; OTPM is 160k separately."
  owner:
    kind: host
    name: anthropic
spec:
  enabled: true
  rules:
    - meter: requests
      amount: 2000
      window: 1m
      strategy: sliding-window
    - meter: tokens
      amount: 800000
      window: 1m
      strategy: sliding-window
---
apiVersion: relay.wyolet.dev/v1
kind: Policy
metadata:
  name: anthropic-tier-3
  displayName: Anthropic Tier 3
  owner:
    kind: host
    name: anthropic
spec:
  rateLimit: anthropic-tier-3-rl
