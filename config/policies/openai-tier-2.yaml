apiVersion: relay.wyolet.dev/v1
kind: RateLimit
metadata:
  name: openai-tier-2-rl
  displayName: OpenAI Tier 2 rate limits
  description: "OpenAI Usage Tier 2 ($50+ paid, 7+ days). Numbers reflect gpt-5 / gpt-5.4 defaults per OpenAI Devs (Sep 2024): Tier 2 TPM bumped from 450k → 1M."
  owner:
    kind: host
    name: openai
spec:
  enabled: true
  rules:
    - meter: requests
      amount: 5000
      window: 1m
      strategy: sliding-window
    - meter: tokens
      amount: 1000000
      window: 1m
      strategy: sliding-window
---
apiVersion: relay.wyolet.dev/v1
kind: Policy
metadata:
  name: openai-tier-2
  displayName: OpenAI Tier 2
  owner:
    kind: host
    name: openai
spec:
  rateLimit: openai-tier-2-rl
