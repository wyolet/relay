apiVersion: relay.wyolet.dev/v1
kind: RateLimit
metadata:
  name: openai-tier-3-rl
  displayName: OpenAI Tier 3 rate limits
  description: "OpenAI Usage Tier 3 ($100+ paid, 7+ days). Numbers reflect gpt-5 / gpt-5.4 defaults per OpenAI Devs (Sep 2024): Tier 3 TPM bumped from 800k → 2M."
  owner:
    kind: host
    name: openai
spec:
  enabled: true
  rules:
    - meter: requests
      amount: 5000
      window: 1m
      strategy: sliding-window
    - meter: tokens
      amount: 2000000
      window: 1m
      strategy: sliding-window
---
apiVersion: relay.wyolet.dev/v1
kind: Policy
metadata:
  name: openai-tier-3
  displayName: OpenAI Tier 3
  owner:
    kind: host
    name: openai
spec:
  rateLimit: openai-tier-3-rl
