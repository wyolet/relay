apiVersion: relay.wyolet.dev/v1
kind: RateLimit
metadata:
  name: openai-tier-5-rl
  displayName: OpenAI Tier 5 rate limits
  description: "OpenAI Usage Tier 5 ($1000+ paid, 30+ days). Numbers reflect gpt-5.4 defaults per devtk.ai (May 2026): 15,000 RPM / 40M TPM. Binding constraint is typically RPM, not TPM."
  owner:
    kind: host
    name: openai
spec:
  enabled: true
  rules:
    - meter: requests
      amount: 15000
      window: 1m
      strategy: sliding-window
    - meter: tokens
      amount: 40000000
      window: 1m
      strategy: sliding-window
---
apiVersion: relay.wyolet.dev/v1
kind: Policy
metadata:
  name: openai-tier-5
  displayName: OpenAI Tier 5
  owner:
    kind: host
    name: openai
spec:
  rateLimit: openai-tier-5-rl
