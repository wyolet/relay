apiVersion: relay.wyolet.dev/v1
kind: RateLimit
metadata:
  name: bedrock-default-rl
  displayName: Amazon Bedrock default rate limits
  description: "Bedrock service quotas are per-(account, region, model) and vary widely. Empty rules = no relay-side cap; the upstream's own quota response governs. Operators with a known quota should clone this and set explicit rules."
  owner:
    kind: host
    name: amazon-bedrock
spec:
  enabled: false
  rules: []
---
apiVersion: relay.wyolet.dev/v1
kind: Policy
metadata:
  name: bedrock-default
  displayName: Amazon Bedrock (default)
  description: "Placeholder upstream policy. No relay-side caps; relies on AWS-side quotas."
  owner:
    kind: host
    name: amazon-bedrock
spec:
  rateLimit: bedrock-default-rl
