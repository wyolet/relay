apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
  name: gemma4
  labels:
    family: gemma
    runtime: ollama
spec:
  provider: dev-ollama
  upstreamName: gemma4:latest
  description: "Gemma 4 8B (Ollama, Q4_K_M)"
  family: gemma4
  capabilities:
    chat: true
    streaming: true
  modalities:
    input: [text]
    output: [text]
  contextWindow: 8192
  license: gemma-terms
  rateLimits:
    - ref: gemma4-rpm-default
      meter: requests
    - ref: gemma4-tpm-default
      meter: tokens

# Model-specific rate limits. Co-located because they belong to the model.
---
apiVersion: relay.wyolet.dev/v1
kind: RateLimit
metadata:
  name: gemma4-rpm-default
spec:
  strategy: sliding-window
  window: 1m
  amount: 1000
---
apiVersion: relay.wyolet.dev/v1
kind: RateLimit
metadata:
  name: gemma4-tpm-default
spec:
  strategy: sliding-window
  window: 1m
  amount: 500000
