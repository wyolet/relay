apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
  name: gemma4
  labels:
    family: gemma
    runtime: ollama
spec:
  provider: ollama
  upstreamName: gemma4:latest
  description: "Gemma 4 8B (Ollama, Q4_K_M)"
  family: gemma4
  capabilities:
    chat: true
    streaming: true
  modalities:
    input: [text]
    output: [text]
  contextWindow: 8192
  license: gemma-terms
  rateLimits:
    - ref: gemma4-rpm
      meter: requests
    - ref: gemma4-tpm
      meter: tokens
    - ref: gemma4-concurrency
      meter: concurrency

# Tight defaults so M3 enforcement is visible end-to-end on a dev box.
# Bump amounts for production-shaped local testing.
---
apiVersion: relay.wyolet.dev/v1
kind: RateLimit
metadata:
  name: gemma4-rpm
spec:
  strategy: sliding-window
  window: 1m
  amount: 5
---
apiVersion: relay.wyolet.dev/v1
kind: RateLimit
metadata:
  name: gemma4-tpm
spec:
  strategy: sliding-window
  window: 1m
  amount: 1000000
---
apiVersion: relay.wyolet.dev/v1
kind: RateLimit
metadata:
  name: gemma4-concurrency
spec:
  strategy: sliding-window
  window: 1m
  amount: 3
