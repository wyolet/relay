apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
  name: gemma4
  labels:
    family: gemma
    runtime: ollama
spec:
  provider: dev-ollama
  upstreamName: gemma4:latest
  description: "Gemma 4 8B (Ollama, Q4_K_M)"
  family: gemma4
  capabilities:
    chat: true
    streaming: true
  modalities:
    input: [text]
    output: [text]
  contextWindow: 8192
  license: gemma-terms

# Model-specific rate limit. Co-located because it belongs to the model.
---
apiVersion: relay.wyolet.dev/v1
kind: RateLimit
metadata:
  name: gemma4-default
spec:
  target:
    kind: Model
    name: gemma4
  rpm: 1000
  tpm: 500000
