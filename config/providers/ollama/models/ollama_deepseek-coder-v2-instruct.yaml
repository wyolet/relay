apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: ollama/deepseek-coder-v2-instruct
    owner:
        kind: provider
        id: ollama
    labels:
        family: ollama/deepseek
        source: litellm
        source_version: "2026-05-14"
spec:
    hosts:
        - host: ollama
          upstreamName: ollama/deepseek-coder-v2-instruct
    family: ollama/deepseek
    capabilities:
        chat: true
        streaming: true
        tools: true
    modalities:
        input:
            - text
        output:
            - text
    contextWindowInput: 32768
    contextWindowOutput: 8192
    contextWindowTotal: 32768
