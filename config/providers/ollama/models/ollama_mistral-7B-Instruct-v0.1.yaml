apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: ollama/mistral-7B-Instruct-v0.1
    owner:
        kind: provider
        name: ollama
    labels:
        family: ollama/mistral
        source: litellm
        source_version: "2026-05-14"
spec:
    hosts:
        - host: ollama
          upstreamName: ollama/mistral-7B-Instruct-v0.1
          adapter: openai
    family: ollama/mistral
    capabilities:
        chat: true
        streaming: true
        tools: true
    modalities:
        input:
            - text
        output:
            - text
    contextWindowInput: 8192
    contextWindowOutput: 8192
    contextWindowTotal: 8192
