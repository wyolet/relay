apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: ollama/llama2:70b
    owner:
        kind: provider
        id: ollama
    labels:
        family: ollama/llama2:70b
        source: litellm
        source_version: "2026-05-14"
spec:
    hosts:
        - host: ollama
          upstreamName: ollama/llama2:70b
          adapter: openai
    family: ollama/llama2:70b
    capabilities:
        chat: true
        streaming: true
    modalities:
        input:
            - text
        output:
            - text
    contextWindowInput: 4096
    contextWindowOutput: 4096
    contextWindowTotal: 4096
