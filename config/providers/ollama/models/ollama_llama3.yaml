apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: ollama/llama3
    owner:
        kind: provider
        id: ollama
    labels:
        family: ollama/llama3
        source: litellm
        source_version: "2026-05-14"
spec:
    hosts:
        - host: ollama
          upstreamName: ollama/llama3
    family: ollama/llama3
    capabilities:
        chat: true
        streaming: true
    modalities:
        input:
            - text
        output:
            - text
    contextWindowInput: 8192
    contextWindowOutput: 8192
    contextWindowTotal: 8192
