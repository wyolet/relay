apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: o3-2025-04-16
    owner:
        kind: provider
        id: openai
    labels:
        family: o-series
        source: litellm
        source_version: "2026-05-14"
spec:
    hosts:
        - host: openai
          upstreamName: o3-2025-04-16
          adapter: openai
    family: o-series
    capabilities:
        chat: true
        streaming: true
        tools: true
        vision: true
        promptCache: true
        reasoning: true
        structuredOutputs: true
        batch: true
        webSearch: true
        fileInput: true
    modalities:
        input:
            - text
            - image
            - file
        output:
            - text
    contextWindowInput: 200000
    contextWindowOutput: 100000
    contextWindowTotal: 200000
