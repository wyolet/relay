apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: gpt-4o-mini-2024-07-18
    labels:
        family: gpt
        source: litellm
        source_version: "2026-05-07"
spec:
    provider: openai
    upstreamName: gpt-4o-mini-2024-07-18
    family: gpt
    capabilities:
        chat: true
        streaming: true
        tools: true
        parallelTools: true
        vision: true
        promptCache: true
        structuredOutput: true
        fileInput: true
        systemMessages: true
    modalities:
        input:
            - text
            - image
            - file
        output:
            - text
    contextWindowInput: 128000
    contextWindowOutput: 16384
    contextWindowTotal: 128000
    pricing:
        currency: USD
        unit: per_million
        rates:
            tokens.batch_input: 0.075
            tokens.batch_output: 0.3
            tokens.cache_read: 0.075
            tokens.input: 0.15
            tokens.output: 0.6
