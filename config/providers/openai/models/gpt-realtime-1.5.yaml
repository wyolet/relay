apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: gpt-realtime-1.5
    owner:
        kind: provider
        id: openai
    labels:
        family: gpt
        source: litellm
        source_version: "2026-05-14"
spec:
    hosts:
        - host: openai
          upstreamName: gpt-realtime-1.5
          adapter: openai
    family: gpt
    capabilities:
        chat: true
        streaming: true
        tools: true
        parallelTools: true
        audioInput: true
        audioOutput: true
        systemMessages: true
    modalities:
        input:
            - text
            - audio
        output:
            - text
            - audio
    contextWindowInput: 32000
    contextWindowOutput: 4096
    contextWindowTotal: 32000
