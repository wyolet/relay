apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: o3-mini
    owner:
        kind: provider
        name: openai
    labels:
        family: o-series
        source: litellm
        source_version: "2026-05-14"
spec:
    hosts:
        - host: openai
          upstreamName: o3-mini
          adapter: openai
    family: o-series
    capabilities:
        chat: true
        streaming: true
        tools: true
        promptCache: true
        reasoning: true
        structuredOutputs: true
    modalities:
        input:
            - text
        output:
            - text
    contextWindowInput: 200000
    contextWindowOutput: 100000
    contextWindowTotal: 200000
