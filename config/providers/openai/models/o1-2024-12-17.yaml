apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: o1-2024-12-17
    owner:
        kind: provider
        name: openai
    labels:
        family: o-series
        source: litellm
        source_version: "2026-05-14"
spec:
    hosts:
        - host: openai
          upstreamName: o1-2024-12-17
          adapter: openai
    family: o-series
    capabilities:
        chat: true
        streaming: true
        tools: true
        parallelTools: true
        vision: true
        promptCache: true
        reasoning: true
        structuredOutputs: true
        fileInput: true
        systemMessages: true
    modalities:
        input:
            - text
            - image
            - file
        output:
            - text
    contextWindowInput: 200000
    contextWindowOutput: 100000
    contextWindowTotal: 200000
