apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: o3-mini-2025-01-31
    labels:
        family: o-series
        source: litellm
        source_version: "2026-05-13"
spec:
    provider: openai
    upstreamName: o3-mini-2025-01-31
    family: o-series
    capabilities:
        chat: true
        streaming: true
        tools: true
        promptCache: true
        reasoning: true
        structuredOutput: true
    modalities:
        input:
            - text
        output:
            - text
    contextWindowInput: 200000
    contextWindowOutput: 100000
    contextWindowTotal: 200000
    pricing:
        currency: USD
        unit: per_million
        rates:
            tokens.cache_read: 0.55
            tokens.input: 1.1
            tokens.output: 4.4
