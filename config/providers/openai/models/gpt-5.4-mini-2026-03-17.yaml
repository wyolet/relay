apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: gpt-5.4-mini-2026-03-17
    labels:
        family: gpt
        source: litellm
        source_version: "2026-05-13"
spec:
    provider: openai
    upstreamName: gpt-5.4-mini-2026-03-17
    family: gpt
    capabilities:
        chat: true
        streaming: true
        tools: true
        parallelTools: true
        vision: true
        promptCache: true
        reasoning: true
        structuredOutput: true
        batch: true
        webSearch: true
        fileInput: true
        systemMessages: true
    modalities:
        input:
            - text
            - image
            - file
        output:
            - text
    contextWindowInput: 272000
    contextWindowOutput: 128000
    contextWindowTotal: 272000
    pricing:
        currency: USD
        unit: per_million
        rates:
            tokens.batch_input: 0.375
            tokens.batch_output: 2.25
            tokens.cache_read: 0.075
            tokens.input: 0.75
            tokens.output: 4.5
