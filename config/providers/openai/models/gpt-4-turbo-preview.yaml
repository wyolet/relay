apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: gpt-4-turbo-preview
    labels:
        family: gpt
        source: litellm
        source_version: "2026-05-13"
spec:
    provider: openai
    upstreamName: gpt-4-turbo-preview
    family: gpt
    capabilities:
        chat: true
        streaming: true
        tools: true
        parallelTools: true
        promptCache: true
        fileInput: true
        systemMessages: true
    modalities:
        input:
            - text
            - file
        output:
            - text
    contextWindowInput: 128000
    contextWindowOutput: 4096
    contextWindowTotal: 128000
    pricing:
        currency: USD
        unit: per_million
        rates:
            tokens.input: 10
            tokens.output: 30
