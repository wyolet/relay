apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: openai/container
    owner:
        kind: provider
        name: openai
    labels:
        family: openai/container
        source: litellm
        source_version: "2026-05-14"
spec:
    hosts:
        - host: openai
          upstreamName: openai/container
          adapter: openai
    family: openai/container
    capabilities:
        chat: true
        streaming: true
    modalities:
        input:
            - text
        output:
            - text
