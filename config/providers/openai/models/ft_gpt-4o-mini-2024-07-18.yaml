apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: ft:gpt-4o-mini-2024-07-18
    owner:
        kind: provider
        name: openai
    labels:
        family: ft:gpt
        source: litellm
        source_version: "2026-05-14"
spec:
    hosts:
        - host: openai
          upstreamName: ft:gpt-4o-mini-2024-07-18
          adapter: openai
    family: ft:gpt
    capabilities:
        chat: true
        streaming: true
        tools: true
        parallelTools: true
        promptCache: true
        structuredOutputs: true
        fileInput: true
        systemMessages: true
    modalities:
        input:
            - text
            - file
        output:
            - text
    contextWindowInput: 128000
    contextWindowOutput: 16384
    contextWindowTotal: 128000
