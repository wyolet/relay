apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: gpt-5-search-api
    owner:
        kind: provider
        name: openai
    labels:
        family: gpt
        source: litellm
        source_version: "2026-05-14"
spec:
    hosts:
        - host: openai
          upstreamName: gpt-5-search-api
          adapter: openai
    family: gpt
    capabilities:
        chat: true
        streaming: true
        tools: true
        parallelTools: true
        vision: true
        promptCache: true
        structuredOutputs: true
        webSearch: true
        fileInput: true
        systemMessages: true
    modalities:
        input:
            - text
            - image
            - file
        output:
            - text
    contextWindowInput: 272000
    contextWindowOutput: 128000
    contextWindowTotal: 272000
