apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: ft:gpt-4o-2024-11-20
    labels:
        family: ft:gpt
        source: litellm
        source_version: "2026-05-13"
spec:
    provider: openai
    upstreamName: ft:gpt-4o-2024-11-20
    family: ft:gpt
    capabilities:
        chat: true
        streaming: true
        tools: true
        parallelTools: true
        promptCache: true
        structuredOutput: true
        fileInput: true
        systemMessages: true
    modalities:
        input:
            - text
            - file
        output:
            - text
    contextWindowInput: 128000
    contextWindowOutput: 16384
    contextWindowTotal: 128000
    pricing:
        currency: USD
        unit: per_million
        rates:
            tokens.cache_creation: 1.875
            tokens.input: 3.75
            tokens.output: 15
