apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: gpt-5.1-chat-latest
    labels:
        family: gpt
        source: litellm
        source_version: "2026-05-13"
spec:
    provider: openai
    upstreamName: gpt-5.1-chat-latest
    family: gpt
    capabilities:
        chat: true
        streaming: true
        vision: true
        promptCache: true
        reasoning: true
        structuredOutput: true
        webSearch: true
        fileInput: true
        systemMessages: true
    modalities:
        input:
            - text
            - image
            - file
        output:
            - text
    contextWindowInput: 128000
    contextWindowOutput: 16384
    contextWindowTotal: 128000
    pricing:
        currency: USD
        unit: per_million
        rates:
            tokens.cache_read: 0.125
            tokens.input: 1.25
            tokens.output: 10
