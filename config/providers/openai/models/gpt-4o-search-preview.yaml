apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: gpt-4o-search-preview
    labels:
        family: gpt
        source: litellm
        source_version: "2026-05-07"
spec:
    provider: openai
    upstreamName: gpt-4o-search-preview
    family: gpt
    capabilities:
        chat: true
        streaming: true
        tools: true
        parallelTools: true
        vision: true
        promptCache: true
        structuredOutput: true
        webSearch: true
        fileInput: true
        systemMessages: true
    modalities:
        input:
            - text
            - image
            - file
        output:
            - text
    contextWindowInput: 128000
    contextWindowOutput: 16384
    contextWindowTotal: 128000
    pricing:
        currency: USD
        unit: per_million
        rates:
            tokens.batch_input: 1.25
            tokens.batch_output: 5
            tokens.cache_read: 1.25
            tokens.input: 2.5
            tokens.output: 10
