apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: gpt-4o-2024-05-13
    labels:
        family: gpt
        source: litellm
        source_version: "2026-05-07"
spec:
    provider: openai
    upstreamName: gpt-4o-2024-05-13
    family: gpt
    capabilities:
        chat: true
        streaming: true
        tools: true
        parallelTools: true
        vision: true
        promptCache: true
        fileInput: true
        systemMessages: true
    modalities:
        input:
            - text
            - image
            - file
        output:
            - text
    contextWindowInput: 128000
    contextWindowOutput: 4096
    contextWindowTotal: 128000
    pricing:
        currency: USD
        unit: per_million
        rates:
            tokens.batch_input: 2.5
            tokens.batch_output: 7.5
            tokens.input: 5
            tokens.output: 15
