apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: gpt-audio-mini
    labels:
        family: gpt
        source: litellm
        source_version: "2026-05-13"
spec:
    provider: openai
    upstreamName: gpt-audio-mini
    family: gpt
    capabilities:
        chat: true
        streaming: true
        tools: true
        parallelTools: true
        batch: true
        audioInput: true
        audioOutput: true
        systemMessages: true
    modalities:
        input:
            - text
            - audio
        output:
            - text
            - audio
    contextWindowInput: 128000
    contextWindowOutput: 16384
    contextWindowTotal: 128000
    pricing:
        currency: USD
        unit: per_million
        rates:
            tokens.audio_input: 10
            tokens.audio_output: 20
            tokens.input: 0.6
            tokens.output: 2.4
