apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: gpt-5.4-nano
    labels:
        family: gpt
        source: litellm
        source_version: "2026-05-07"
spec:
    provider: openai
    upstreamName: gpt-5.4-nano
    family: gpt
    capabilities:
        chat: true
        streaming: true
        tools: true
        parallelTools: true
        vision: true
        promptCache: true
        reasoning: true
        structuredOutput: true
        batch: true
        webSearch: true
        fileInput: true
        systemMessages: true
    modalities:
        input:
            - text
            - image
            - file
        output:
            - text
    contextWindowInput: 272000
    contextWindowOutput: 128000
    contextWindowTotal: 272000
    pricing:
        currency: USD
        unit: per_million
        rates:
            tokens.batch_input: 0.09999999999999999
            tokens.batch_output: 0.625
            tokens.cache_read: 0.02
            tokens.input: 0.19999999999999998
            tokens.output: 1.25
