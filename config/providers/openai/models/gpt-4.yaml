apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: gpt-4
    labels:
        family: gpt
        source: litellm
        source_version: "2026-05-07"
spec:
    provider: openai
    upstreamName: gpt-4
    family: gpt
    capabilities:
        chat: true
        streaming: true
        tools: true
        promptCache: true
        systemMessages: true
    modalities:
        input:
            - text
        output:
            - text
    contextWindowInput: 8192
    contextWindowOutput: 4096
    contextWindowTotal: 8192
    pricing:
        currency: USD
        unit: per_million
        rates:
            tokens.input: 30
            tokens.output: 60
