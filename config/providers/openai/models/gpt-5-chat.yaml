apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: gpt-5-chat
    owner:
        kind: provider
        id: openai
    labels:
        family: gpt
        source: litellm
        source_version: "2026-05-14"
spec:
    hosts:
        - host: openai
          upstreamName: gpt-5-chat
    family: gpt
    capabilities:
        chat: true
        streaming: true
        vision: true
        promptCache: true
        reasoning: true
        structuredOutputs: true
        batch: true
        fileInput: true
        systemMessages: true
    modalities:
        input:
            - text
            - image
            - file
        output:
            - text
    contextWindowInput: 128000
    contextWindowOutput: 16384
    contextWindowTotal: 128000
    aliases:
        - gpt-5-chat-latest
