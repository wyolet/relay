apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: ft:o4-mini-2025-04-16
    owner:
        kind: provider
        id: openai
    labels:
        family: ft:o4
        source: litellm
        source_version: "2026-05-14"
spec:
    hosts:
        - host: openai
          upstreamName: ft:o4-mini-2025-04-16
    family: ft:o4
    capabilities:
        chat: true
        streaming: true
        tools: true
        promptCache: true
        reasoning: true
        structuredOutputs: true
    modalities:
        input:
            - text
        output:
            - text
    contextWindowInput: 200000
    contextWindowOutput: 100000
    contextWindowTotal: 200000
