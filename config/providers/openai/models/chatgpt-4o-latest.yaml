apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: chatgpt-4o-latest
    owner:
        kind: provider
        id: openai
    labels:
        family: chatgpt
        source: litellm
        source_version: "2026-05-14"
spec:
    hosts:
        - host: openai
          upstreamName: chatgpt-4o-latest
    family: chatgpt
    capabilities:
        chat: true
        streaming: true
        tools: true
        parallelTools: true
        vision: true
        promptCache: true
        fileInput: true
        systemMessages: true
    modalities:
        input:
            - text
            - image
            - file
        output:
            - text
    contextWindowInput: 128000
    contextWindowOutput: 4096
    contextWindowTotal: 128000
