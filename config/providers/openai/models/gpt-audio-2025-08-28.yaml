apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: gpt-audio-2025-08-28
    owner:
        kind: provider
        name: openai
    labels:
        family: gpt
        source: litellm
        source_version: "2026-05-14"
spec:
    hosts:
        - host: openai
          upstreamName: gpt-audio-2025-08-28
          adapter: openai
    family: gpt
    capabilities:
        chat: true
        streaming: true
        tools: true
        parallelTools: true
        batch: true
        audioInput: true
        audioOutput: true
        systemMessages: true
    modalities:
        input:
            - text
            - audio
        output:
            - text
            - audio
    contextWindowInput: 128000
    contextWindowOutput: 16384
    contextWindowTotal: 128000
