apiVersion: relay.wyolet.dev/v1
kind: Model
metadata:
    name: o1
    labels:
        family: o1
        source: litellm
        source_version: "2026-05-13"
spec:
    provider: openai
    upstreamName: o1
    family: o1
    capabilities:
        chat: true
        streaming: true
        tools: true
        vision: true
        promptCache: true
        reasoning: true
        structuredOutput: true
        fileInput: true
        systemMessages: true
    modalities:
        input:
            - text
            - image
            - file
        output:
            - text
    contextWindowInput: 200000
    contextWindowOutput: 100000
    contextWindowTotal: 200000
    pricing:
        currency: USD
        unit: per_million
        rates:
            tokens.cache_read: 7.5
            tokens.input: 15
            tokens.output: 60
