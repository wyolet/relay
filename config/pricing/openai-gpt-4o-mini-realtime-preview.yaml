apiVersion: relay.wyolet.dev/v1
kind: Pricing
metadata:
    name: openai-gpt-4o-mini-realtime-preview
    owner:
        kind: host
        id: openai
spec:
    currency: USD
    targetModels:
        - gpt-4o-mini-realtime-preview
    rates:
