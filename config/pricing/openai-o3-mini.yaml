apiVersion: relay.wyolet.dev/v1
kind: Pricing
metadata:
    name: openai-o3-mini
    owner:
        kind: host
        id: openai
spec:
    currency: USD
    targetModels:
        - o3-mini
    rates:
        - meter: tokens.input
          unit: per_million
          amount: 1.1
        - meter: tokens.output
          unit: per_million
          amount: 4.4
        - meter: tokens.cache_read
          unit: per_million
          amount: 0.55
