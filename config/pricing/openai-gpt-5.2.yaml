apiVersion: relay.wyolet.dev/v1
kind: Pricing
metadata:
    name: openai-gpt-5.2
    owner:
        kind: host
        id: openai
spec:
    currency: USD
    targetModels:
        - gpt-5.2
    rates:
        - meter: tokens.input
          unit: per_million
          amount: 1.75
        - meter: tokens.output
          unit: per_million
          amount: 14
        - meter: tokens.cache_read
          unit: per_million
          amount: 0.175
