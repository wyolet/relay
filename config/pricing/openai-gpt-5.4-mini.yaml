apiVersion: relay.wyolet.dev/v1
kind: Pricing
metadata:
    name: openai-gpt-5.4-mini
    owner:
        kind: host
        name: openai
spec:
    currency: USD
    targetModels:
        - gpt-5.4-mini
    rates:
        - meter: tokens.input
          unit: per_million
          amount: 0.75
        - meter: tokens.output
          unit: per_million
          amount: 4.5
        - meter: tokens.cache_read
          unit: per_million
          amount: 0.075
