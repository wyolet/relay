apiVersion: relay.wyolet.dev/v1
kind: RateLimit
metadata:
  name: inference-proxy-anonymous
  displayName: Inference rate limits (anonymous proxy)
spec:
  source: system_mirrored
  description: "Per-IP runtime cap for anonymous proxy-mode inference requests (X-WR-Proxy-Mode: Proxy without a Relay key). Protects against abuse of the proxy path."
  window: 1m
  strategy: sliding-window
  enabled: true
  rules:
    - meter: requests
      amount: 60
      window: 1m
      strategy: sliding-window
    - meter: tokens
      amount: 5000
      window: 1m
      strategy: sliding-window
    - meter: concurrency
      amount: 10
