apiVersion: relay.wyolet.dev/v1
kind: RateLimit
metadata:
  name: system-api
  displayName: API rate limits
  description: "DoS protection for control and non-inference public API endpoints. Per-IP runtime cap."
  owner:
    kind: system
spec:
  enabled: false
  rules:
    - meter: requests
      amount: 10
      window: 1s
      strategy: sliding-window
    - meter: requests
      amount: 300
      window: 1m
      strategy: sliding-window
