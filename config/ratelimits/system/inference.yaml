apiVersion: relay.wyolet.dev/v1
kind: RateLimit
metadata:
  name: inference
  displayName: Inference rate limits (managed)
  description: "Config ceiling for per-key user rate limits on authed normal-mode inference requests. Empty rules = no ceiling; operator adds rules to cap what per-key RLs can configure."
  owner:
    kind: system
spec:
  enabled: false
  rules: []
