# Wyolet Relay — convenience stack for self-hosting.
#
# The lean relay image wired to its own Postgres + Valkey, with volumes and
# all environment configured. One command:
#
#   docker compose up -d
#   docker compose logs -f relay      # watch startup
#
# The catalog is baked into the image and seeded into Postgres on first boot.
# Admin UI → http://localhost:8081 · inference API → http://localhost:8080.
#
# Before a real deployment: set a stable RELAY_MASTER_KEY (it encrypts your
# stored provider keys) and change RELAY_ADMIN_PASSWORD — put them in a `.env`
# file next to this one, or edit the defaults below.
#
# Contributors building from source / running the multi-pod dev stack: see
# deploy/compose/ and `make dev`.

name: relay

volumes:
  pg-data:
  valkey-data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: relay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay
      POSTGRES_DB: relay
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay"]
      interval: 3s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    container_name: relay-valkey
    restart: unless-stopped
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 3s
      timeout: 5s
      retries: 10

  relay:
    image: ${RELAY_IMAGE:-wyolet/relay:latest}
    container_name: relay
    restart: unless-stopped
    depends_on:
      postgres: {condition: service_healthy}
      valkey: {condition: service_healthy}
    # Mounts the repo's config/ for the admin user (UI login), the system
    # rate-limit rules, and governance settings.
    volumes:
      - ./config:/config:ro
    environment:
      RELAY_PG_DSN: postgres://relay:relay@postgres:5432/relay?sslmode=disable
      RELAY_STATE_BACKEND: redis
      RELAY_REDIS_ADDR: valkey:6379
      RELAY_CONFIG_DIR: /config
      RELAY_AUTO_SEED_IF_EMPTY: "1"
      RELAY_CONTROL_PORT: "8081"
      RELAY_INFERENCE_API_URL: http://localhost:8080
      RELAY_COOKIE_SECURE: "false"
      # Master key encrypts stored provider keys — set a stable value for
      # production (empty is fine to boot; required only for stored secrets).
      RELAY_MASTER_KEY: ${RELAY_MASTER_KEY:-}
      # Admin UI login: the username in config/users/admin.yaml + this password.
      RELAY_ADMIN_PASSWORD: ${RELAY_ADMIN_PASSWORD:-change-me-please}
      # Break-glass control-plane bearer (CI / scripts).
      RELAY_ADMIN_TOKEN: ${RELAY_ADMIN_TOKEN:-}
    ports:
      - "8080:8080"   # inference API (OpenAI/Anthropic shapes)
      - "8081:8081"   # admin UI + control API
